<!DOCTYPE html>
<!-- biome-ignore lint/a11y/useValidLang: <explanation> -->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finitos</title>
</head>
<body>
    <div class="selection">
        <form>
            <input type="text" id="Largura da Grid" name="Largura da Grid">
            <input type="text" id="Altura da Grid"  name="Altura da Grid">
            <label for="Largura da Grid">Largura da Grid</label>
            <label for="Altura da Grid">Altura da Grid</label>
            <input type="button" value="Iniciar" onclick="_canvasSetup()">
        </form>
    </div>
    <canvas id="canvas"></canvas>
    <script src="classes/main.js"></script>
    <script>
        let renderer;
        let grid;
        
        function _canvasSetup() {
            const canvas = document.getElementById("canvas");
            const gridWidthInPixels = 1000;
            const gridHeightInPixels = 1000; 
            canvas.width = gridWidthInPixels;
            canvas.height = gridHeightInPixels;
            const gridW = parseInt(document.getElementById("Largura da Grid").value, 10);
            const gridH = parseInt(document.getElementById("Altura da Grid").value, 10);
            const tAmb = parseFloat(prompt("Defina a temperatura ambiente")); 
            const cellHeight = gridHeightInPixels / gridH;
            const cellWidth = gridWidthInPixels / gridW; 
            
            
            renderer = new Renderer(canvas);
            grid = new Grid(gridW, gridH, cellWidth, cellHeight, tAmb, renderer, {x: gridWidthInPixels/gridW, y: gridHeightInPixels/gridH});

            grid.setup();
            cancelAnimationFrame(loop);
            requestAnimationFrame(loop);

        }   
        function loop(){
            const before = grid.grid.map(row => row.map(c => ({ temp: c.temp })));
            grid.update();
            grid.draw();

            if (grid.needsToStop(before, grid.grid, 0.01)) {
                console.log("Parou");
                return;
            }
            requestAnimationFrame(loop)

        }
        
    </script>
</body>
</html>
