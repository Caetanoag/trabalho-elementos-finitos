<!DOCTYPE html>
<!-- biome-ignore lint/a11y/useValidLang: <explanation> -->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finitos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="setup-panel" class="setup-panel">
        <label for="gridW">Largura da Grid</label>
        <input type="number" name="gridW" id="gridW" placeholder="Largura da Grid" min="100" value="500" max="1000">
        <label for="gridH">Altura da Grid</label>
        <input type="number" name="gridH" id="gridH" placeholder="Altura da Grid" min="100" value="500" max="1000">
        <label for="tAmb">Temperatura Ambiente</label>
        <input type="number" name="tAmb" id="tAmb" placeholder="Temperatura Ambiente" min="-273" value="25" max="100">

        <label for="polygons">Número de polígonos</label>
        <input type="number" name="polygons" id="polygons" placeholder="Número de polígonos" min="1" value="1" max="20">

        <button type="button" id="draw-polygon-cards-btn">Configurar Poligonos</button>
        <div id="polygon-cards-container" class="polygon-cards-container"></div>
        <button type="button" id="start-simulation-btn">Iniciar simulação</button>

    </div>

    <canvas id="canvas" style="display: none;"></canvas>
    <script src="js/classes/main.js"></script>
    <script src="js/game.js"></script>
    <script src="js/frontend.js"></script>
    
</body>
</html>
